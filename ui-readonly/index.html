<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据标准管理系统 - 只读界面</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="page-header">
    <div>
      <h1>数据标准管理系统</h1>
      <p id="apiVersion" class="api-version">API 版本：加载中...</p>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="输入关键词（标准编码/名称/描述）" />
        <select id="statusFilter">
          <option value="1" selected>已发布</option>
          <option value="0">草稿</option>
          <option value="2">退役</option>
          <option value="3">废弃</option>
          <option value="all">全部状态</option>
        </select>
        <button id="keywordBtn" type="button">关键词搜索</button>
        <button id="vectorBtn" type="button">向量搜索</button>
        <button id="resetBtn" type="button" class="ghost">重置</button>
      </div>

      <div id="statusBar" class="status-bar">默认显示最新 10 条标准记录</div>
      <div id="statusStats" class="status-stats"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button class="sort-btn" data-field="code" type="button">标准编码</button></th>
              <th><button class="sort-btn" data-field="name" type="button">名称</button></th>
              <th>内容摘要</th>
              <th><button class="sort-btn" data-field="created_at" type="button">创建时间</button></th>
              <th><button class="sort-btn" data-field="updated_at" type="button">最近修改</button></th>
              <th><button class="sort-btn" data-field="version" type="button">版本</button></th>
              <th>状态</th>
              <th>是否含有标准代码</th>
            </tr>
          </thead>
          <tbody id="standardTableBody"></tbody>
        </table>
      </div>
      <div class="pager">
        <button id="prevPageBtn" type="button" class="ghost">上一页</button>
        <span id="pageInfo">第 1 / 1 页</span>
        <button id="nextPageBtn" type="button" class="ghost">下一页</button>
      </div>
    </section>

    <section class="panel">
      <h2>数据标准详情</h2>
      <div id="detailEmpty" class="empty">点击上方标准行查看详细内容</div>
      <div id="detailContent" class="hidden"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
